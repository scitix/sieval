# ------------------------------------------------------------------------------
# RULER multi-length sweep — 13-task long-context benchmark
# ------------------------------------------------------------------------------
# Runs the full RULER suite across 3 context lengths (4k / 32k / 128k) using
# a Qwen3-8B-Instruct model as an example. Produces per-cell, per-length, and
# overall scores in one shot — no post-processing command needed.
#
# ── Prerequisites ──────────────────────────────────────────────────────────
#
# 1. Download datasets:
#      sieval dataset download ruler
#    This stages four sources:
#      - paul_graham_essays/PaulGrahamEssays.json.gz  (NIAH/VT haystack)
#      - english_words.json                           (CWE fallback vocab)
#      - dev-v2.0.json                                (SQuAD v2 QA)
#      - hotpotqa/hotpot_qa                           (HotpotQA distractor docs)
#
# 2. tokenizer_path MUST match the model being evaluated. RULER sizes each
#    prompt to exactly fill the requested context window using the model's own
#    tokenizer. A mismatched tokenizer silently produces prompts that are too
#    short or overflow — use the HF model id or a local path.
#
# 3. continue_final_message + add_generation_prompt. RULER's scoring relies on
#    the model continuing from the answer-prefix cue ("Answer: The special magic
#    number is:") rather than starting a fresh assistant turn. Without the flags
#    below, the chat template closes the prefix turn and adds a new generation
#    prompt, breaking the continuation silently:
#
#      models.*.args.extra_body:
#        continue_final_message: True
#        add_generation_prompt: False
#
# 4. YaRN for lengths beyond the model's native context. Qwen3-8B has a native
#    context of 32 768 tokens; the 128k tier needs YARN scaling. The override
#    below injects the scaling config into the engine at launch. For an already-
#    running API endpoint, set the rope_scaling at deploy time instead.
#
# ── Output ─────────────────────────────────────────────────────────────────
#
#   sieval leaderboard report ./outputs/ruler-multilength
#
# Reports per-cell scores (score_niah_single_1_4k, …), per-length 13-task means
# (score_4k, score_32k, score_128k), and the overall headline (score).
#
# ── Running ────────────────────────────────────────────────────────────────
#
#   sieval run ruler-multilength.yaml      # local-launch path (spins up engine)
#   sieval eval ruler-multilength.yaml     # external API endpoint path
#
# Edit the fields marked "EDIT ME" before running.
# ------------------------------------------------------------------------------
result_dir: ./outputs/ruler-multilength

# ── Models ─────────────────────────────────────────────────────────────────────
# One entry per distinct serving config. Lengths ≤ native_ctx share the same
# entry (no YARN); longer lengths each get their own entry with a YARN override.

models:
  qwen3-8b-native:
    args:
      concurrency_limit: 64
      temperature: 0.7
      top_p: 0.8
      presence_penalty: 1.5
      extra_body:
        enable_thinking: false
        top_k: 20
        # Required: keep the answer-prefix turn open so the model *continues*
        # it. Without these two flags the chat template appends a new generation
        # prompt and the answer-prefix continuation silently breaks.
        continue_final_message: True
        add_generation_prompt: False
    infer:
      backend: sglang
      recipe: qwen3-8b
      checkpoint: /path/to/Qwen3-8B        # EDIT ME
      overrides: { context_length: 32768 }
    infer_meta:
      gpu: H200-141G
      image: lmsysorg/sglang:latest

  # 128k requires YARN to extrapolate past the native 32k window.
  # factor = ceil(131072 / 32768) = 4
  qwen3-8b-yarn128k:  # YARN factor=4 (128k > native 32k)
    args:
      concurrency_limit: 64
      temperature: 0.7
      top_p: 0.8
      extra_body:
        top_k: 20
        presence_penalty: 1.5
        enable_thinking: false
        continue_final_message: True
        add_generation_prompt: False
    infer:
      backend: sglang
      recipe: qwen3-8b
      checkpoint: /path/to/Qwen3-8B        # EDIT ME
      overrides: {
        context_length: 131072,
        disable_cuda_graph: True,
        json_model_override_args: "{\"rope_scaling\": {\"rope_type\": \"yarn\", \"factor\": 4, \"original_max_position_embeddings\": 32768}}"
      }
    infer_meta:
      gpu: H200-141G
      image: lmsysorg/sglang:latest

# ── Datasets ───────────────────────────────────────────────────────────────────
# One entry per (subtask, context_length) combination. tokenizer_path must match
# the evaluated model — RULER sizes prompts with the model's own tokenizer.

datasets:
  # 4k -----------------------------------------------------------------------
  ruler_4k:
    class: RulerDataset
    path: "${SIEVAL_DATA_DIR}/ruler"
    args: { subtask: all, max_seq_length: 4096, num_samples: 500, tokenizer_type: hf, tokenizer_path: /path/to/Qwen3-8B }  # EDIT tokenizer_path

  # 32k ----------------------------------------------------------------------
  ruler_32k:
    class: RulerDataset
    path: "${SIEVAL_DATA_DIR}/ruler"
    args: { subtask: all, max_seq_length: 32768, num_samples: 500, tokenizer_type: hf, tokenizer_path: /path/to/Qwen3-8B }  # EDIT tokenizer_path

  # 128k ---------------------------------------------------------------------
  ruler_128k:
    class: RulerDataset
    path: "${SIEVAL_DATA_DIR}/ruler"
    args: { subtask: all, max_seq_length: 131072, num_samples: 500, tokenizer_type: hf, tokenizer_path: /path/to/Qwen3-8B }  # EDIT tokenizer_path

# ── Tasks ──────────────────────────────────────────────────────────────────────

tasks:
  ruler_4k:
    class: RulerZeroShotGenTask
    dataset: ruler_4k
    model: qwen3-8b-native

  ruler_32k:
    class: RulerZeroShotGenTask
    dataset: ruler_32k
    model: qwen3-8b-native

  ruler_128k:
    class: RulerZeroShotGenTask
    dataset: ruler_128k
    model: qwen3-8b-yarn128k
