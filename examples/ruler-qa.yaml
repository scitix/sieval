# ------------------------------------------------------------------------------
# RULER QA — comprehensive long-context QA eval (completion / base-model mode)
# ------------------------------------------------------------------------------
# Mirrors OpenCompass `examples/eval_ruler.py`: the RULER QA family run as the
# cross-product of {squad, hotpotqa} × {context lengths}, each scored by the same
# RulerQaZeroShotBaseGenTask. "Comprehensive" lives here at the config layer —
# sieval Tasks score one dataset each; averaging across the matrix is the
# leaderboard/report layer's job.
#
# Each dataset block re-synthesizes its prompts at a fixed `max_seq_length`
# (the RULER haystack is built to fill that budget), so one Dataset class
# (RulerQaDataset) yields many sized instances via `args`.
#
# Inference mode: this config uses the COMPLETION endpoint (`type: gen` → sieval
# GenModel → /v1/completions), faithful to original RULER — the synthesized
# `input + answer_prefix` ("... Answer:") is fed as one raw string and the model
# continues it. (The chat variant RulerQaZeroShotGenTask instead folds the answer
# cue into a user turn; switch to it + `type: chat` if you want chat semantics.)
#
# Targets an already-running OpenAI-compatible API endpoint (no local launch):
#   1. sieval dataset download ruler_qa     # stages dev-v2.0.json + hotpotqa
#   2. sieval eval ruler-qa.yaml
#
# Scale: `num_samples` is set low (8) for a runnable smoke. RULER uses 500;
# raise it once the run looks good. Large `max_seq_length` is slow —
# synthesis tokenizes every sample.
# ------------------------------------------------------------------------------
result_dir: ./outputs/ruler-qa

# API-backed model: points at an existing OpenAI-compatible endpoint instead of
# launching a local checkpoint. Required: `name` (model id sent to the API) and
# `api_base`; `api_key` may be a placeholder for unauthenticated local servers.
# `type: gen` selects the text-completions backend (GenModel). Everything under
# `args` is forwarded to the completions call (plus the sieval-specific
# `concurrency_limit` / `max_retries`).
models:
  qwen2.5-vl-72b:
    name: Qwen/Qwen2.5-VL-72B-Instruct          # served model name at the endpoint
    type: gen                                   # completions API (raw-string continuation)
    api_base: https://api.scitix.ai/model-api/v1
    api_key: ${SCITIX_API_KEY}                  # EDIT ME — env var or literal key
    args:
      concurrency_limit: 128
      max_retries: 3
      temperature: 0.0                          # RULER uses greedy decoding

# squad × 4k and hotpotqa × 4k. Add 8k/16k/32k/... blocks to widen the sweep;
# `${SIEVAL_DATA_DIR}/ruler_qa` is where `sieval dataset download` stages both
# source files.
datasets:
  ruler_qa_squad_4k:
    class: RulerQaDataset
    path: "${SIEVAL_DATA_DIR}/ruler_qa"
    args: { dataset: squad, max_seq_length: 4096, num_samples: 8 }
  ruler_qa_hotpotqa_4k:
    class: RulerQaDataset
    path: "${SIEVAL_DATA_DIR}/ruler_qa"
    args: { dataset: hotpotqa, max_seq_length: 4096, num_samples: 8 }

# One RulerQaZeroShotBaseGenTask per dataset instance, all against the same model.
# The task is thin (continue prompt → string_match_part), so it takes no per-run
# k/n knobs. `max_tokens: 32` matches RULER's `tokens_to_generate=32` window: the
# completion may run on past the answer, but substring scoring only needs the gold
# answer to appear, so truncation is harmless. Raise it if answers get clipped.
tasks:
  ruler_qa_squad_4k:
    class: RulerQaZeroShotBaseGenTask
    dataset: ruler_qa_squad_4k
    model: qwen2.5-vl-72b
    infer_args:
      max_tokens: 32
    runner_config:
      concurrency_limits:
        infer: 4

  ruler_qa_hotpotqa_4k:
    class: RulerQaZeroShotBaseGenTask
    dataset: ruler_qa_hotpotqa_4k
    model: qwen2.5-vl-72b
    infer_args:
      max_tokens: 32
    runner_config:
      concurrency_limits:
        infer: 4
