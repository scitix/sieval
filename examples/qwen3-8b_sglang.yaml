# ------------------------------------------------------------------------------
# RULER multi-length sweep — 6 length tiers x 13 tasks
# ------------------------------------------------------------------------------
# GENERATED by scripts/gen_ruler_qwen3_8b_sglang.py — edit that script, not this file.
#   lengths: 4k, 8k, 16k, 32k, 64k, 128k   native ctx: 32k
#   backend: sglang   tokenizer_model: /mnt/workspace/Qwen-Qwen3-8b  (prompts sized with this; keep == model)
#
# Each length tier runs the full 13-task RULER suite; the per-tier 13-task
# average is RULER's score at that length, and the "effective length" is the
# longest tier still clearing the threshold — compute both with
#   sieval leaderboard ruler-effective ./outputs/ruler_qwen3_8b_sglang
#
# YARN: tiers <= native ctx run with no extrapolation; tiers > native ctx get an
# engine override with factor=ceil(length/native). For an API endpoint, YARN is
# fixed server-side — delete `overrides` and point `api_base` at the deployment.
#
# `num_samples` is 500 here; RULER uses 500. Large lengths are slow
# (synthesis tokenizes every sample).
# ------------------------------------------------------------------------------
result_dir: ./outputs/ruler_qwen3_8b_sglang

models:
  model-native:
    args:
      concurrency_limit: 64
      temperature: 0.7
      top_p: 0.8
      extra_body:
        chat_template_kwargs:
          enable_thinking: false  # set true + raise max_tokens for thinking
          top_k: 20
          presence_penalty: 1.5
    infer:
      backend: sglang
      checkpoint: /mnt/workspace/Qwen-Qwen3-8b        # EDIT ME
      overrides: { context_length: 32768, enable_deterministic_inference: true }
    infer_meta:
      gpu: H200-141G
      image: lmsysorg/sglang:latest

  model-yarn64k:  # YARN factor=2 (64k > native 32k)
    args:
      concurrency_limit: 64
      temperature: 0.7
      top_p: 0.8
      extra_body:
        chat_template_kwargs:
          enable_thinking: false  # set true + raise max_tokens for thinking
          top_k: 20
          presence_penalty: 1.5
    infer:
      backend: sglang
      checkpoint: /mnt/workspace/Qwen-Qwen3-8b        # EDIT ME
      overrides: { context_length: 65536, enable_deterministic_inference: true, json_model_override_args: "{\"rope_scaling\": {\"rope_type\": \"yarn\", \"factor\": 2.0, \"original_max_position_embeddings\": 32768}}" }
    infer_meta:
      gpu: H200-141G
      image: lmsysorg/sglang:latest

  model-yarn128k:  # YARN factor=4 (128k > native 32k)
    args:
      concurrency_limit: 64
      temperature: 0.7
      top_p: 0.8
      extra_body:
        chat_template_kwargs:
          enable_thinking: false  # set true + raise max_tokens for thinking
          top_k: 20
          presence_penalty: 1.5
    infer:
      backend: sglang
