# ==============================================================================
# Ruler Long-Context Evaluation — Qwen3-8B With Thinking Enabled
# ==============================================================================
# Evaluation scenario: Test model's reasoning ability when internal thinking
#   chains are enabled, at 16K context length.
# Task: Ruler benchmark (0-shot, generative + thinking) — single context × single model
#
# Configuration highlights:
#   - enable_thinking: true (enable Qwen3 internal reasoning chain)
#   - thinking_budget: 8192 tokens (max length for thinking phase)
#   - Custom logit processor: Qwen3ThinkingBudgetLogitProcessor
#   - Context length: 16K (moderate length + thinking combination)
#   - Concurrency limit: 32 (lower due to high thinking compute cost)
#   - Temperature/top_p: 0.6 / 0.95 (relatively stable, encourages diversity)
#   - GPU: L40 (inference-optimized, does not require H200)
#
# Setup steps:
#   1. Prepare data: sieval dataset download ruler
#      Pass enable_thinking=true to dataset config
#   2. Check model path and GPU:
#      - checkpoint: /root/models/Qwen3-8b
#      - ensure enable_custom_logit_processor: true
#   3. Run evaluation: sieval run ruler-qwen3-8b-thinking.yaml
#
# Editable fields:
#   models.qwen3-8b.infer.checkpoint         — local model path
#   datasets.ruler_16k.args.tokenizer_path   — tokenizer path
#   custom_logit_processor is usually generated by framework; do not edit manually
#
# Output:
#   result_dir: ./outputs/ruler_qwen3_8b_thinking
#   Single task evaluation with separated thinking chain and final answer stats
#
# Note: Thinking configuration must be used with reasoning_parser: qwen3
# ==============================================================================

result_dir: ./outputs/ruler_qwen3_8b_thinking
models:
  qwen3-8b:
    args:
      concurrency_limit: 32
      temperature: 0.6
      top_p: 0.95
      extra_body:
        enable_thinking: true
        top_k: 20
        custom_logit_processor: '{"callable": "80049554000000000000008c2a73676c616e672e7372742e73616d706c696e672e637573746f6d5f6c6f6769745f70726f636573736f72948c215177656e335468696e6b696e674275646765744c6f67697450726f636573736f729493942e"}'
        custom_params:
          thinking_budget: 8192
    infer:
      backend: sglang
      recipe: qwen3-8b
      checkpoint: /root/models/Qwen3-8b
      overrides:
        context_length: 32768
        reasoning_parser: qwen3
        enable_custom_logit_processor: true
    infer_meta:
      gpu: L40
      image: lmsysorg/sglang:latest

datasets:
  ruler_16k:
    class: RulerDataset
    path: ${SIEVAL_DATA_DIR}
    args:
      subtask: all
      max_seq_length: 16384
      num_samples: 500
      tokenizer_type: hf
      tokenizer_path: /root/models/Qwen3-8b
      enable_thinking: true
      model_name: qwen3

tasks:
  ruler_16k:
    class: RulerZeroShotGenTask
    dataset: ruler_16k
    model: qwen3-8b
