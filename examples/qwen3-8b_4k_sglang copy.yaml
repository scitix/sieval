# ------------------------------------------------------------------------------
# RULER multi-length sweep — 1 length tiers x 13 tasks
# ------------------------------------------------------------------------------
# GENERATED by scripts/gen_ruler_qwen3_8b_sglang.py — edit that script, not this file.
#   lengths: 4k   native ctx: 32k
#   backend: sglang   tokenizer_model: /root/models/Qwen3-8b  (prompts sized with this; keep == model)
#
# Each length tier runs the full 13-task RULER suite; the per-tier 13-task
# average is RULER's score at that length, and the "effective length" is the
# longest tier still clearing the threshold — compute both with
#   sieval leaderboard ruler-effective ./outputs/ruler_qwen3_8b_sglang_test
#
# YARN: tiers <= native ctx run with no extrapolation; tiers > native ctx get an
# engine override with factor=ceil(length/native). For an API endpoint, YARN is
# fixed server-side — delete `overrides` and point `api_base` at the deployment.
#
# `num_samples` is 500 here; RULER uses 500. Large lengths are slow
# (synthesis tokenizes every sample).
# ------------------------------------------------------------------------------
result_dir: ./outputs/ruler_qwen3_8b_sglang_test

models:
  Qwen3-8B-native:
    args:
      concurrency_limit: 64
      temperature: 0.7
      top_p: 0.8
      presence_penalty: 1.5
      extra_body:
        enable_thinking: false
        top_k: 20
        continue_final_message: True
        add_generation_prompt: False
    infer:
      backend: sglang
      checkpoint: /root/models/Qwen3-8b 
      overrides: { context_length: 32768 }
    infer_meta:
      gpu: H200-141GB
      image: lmsysorg/sglang:latest

datasets:
  ruler_qa_squad_4k:
    class: RulerQaDataset
    path: "${SIEVAL_DATA_DIR}/ruler_qa"
    args: { max_seq_length: 4096, num_samples: 500, tokenizer_model: /root/models/Qwen3-8b, dataset: squad }
  ruler_qa_hotpotqa_4k:
    class: RulerQaDataset
    path: "${SIEVAL_DATA_DIR}/hotpotqa"
    args: { max_seq_length: 4096, num_samples: 500, tokenizer_model: /root/models/Qwen3-8b, dataset: hotpotqa }

tasks:
  ruler_qa_squad_4k: { class: RulerQaZeroShotGenTask, dataset: ruler_qa_squad_4k, model: Qwen3-8B-native }
  ruler_qa_hotpotqa_4k: { class: RulerQaZeroShotGenTask, dataset: ruler_qa_hotpotqa_4k, model: Qwen3-8B-native }
