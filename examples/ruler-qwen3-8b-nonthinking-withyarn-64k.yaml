# ==============================================================================
# Ruler Long-Context Evaluation — Qwen3-8B + YaRN Extended to 64K
# ==============================================================================
# Evaluation scenario: Test model's long document understanding ability when
#   extended to 64K context via YaRN (Yet Another RoPE eXtension Numbers)
#   position interpolation (without thinking chains).
# Task: Ruler benchmark (0-shot, generative) — 64K long context × single model
#
# Configuration highlights:
#   - Position interpolation: YaRN rope scaling (factor=4.0)
#   - Original max position: 32K → extended to 64K
#   - enable_thinking: false (for compute cost reasons)
#   - Concurrency limit: 64 (same as baseline)
#   - Temperature/top_p: 0.7 / 0.8 + presence_penalty=1.5 (reduce repetition)
#   - GPU: H200-141G (compute-intensive, requires larger VRAM)
#   - disable_cuda_graph: true (long context optimization)
#
# Setup steps:
#   1. Prepare data: sieval dataset download ruler
#   2. Verify Qwen3-8B supports YaRN extension (typically in latest versions)
#   3. Edit model path and tokenizer path
#   4. Run evaluation: sieval run ruler-qwen3-8b-nonthinking-withyarn-64k.yaml
#
# Editable fields:
#   models.qwen3-8b-yarn64k.infer.checkpoint        — local model path
#   datasets.ruler_64k.args.tokenizer_path          — tokenizer path
#   rope_scaling in json_model_override_args is typically framework-preset;
#     avoid manual edits
#
# Output:
#   result_dir: ./outputs/ruler_qwen3_8b_nonthinking_64k
#   Single task evaluation results with 64K context performance data
#
# Warnings:
#   - Long context evaluation is time-consuming; efficient GPU required
#   - max_seq_length appears to be set to 1131072 (should be ~65536);
#     please verify
# ==============================================================================

result_dir: ./outputs/ruler_qwen3_8b_nonthinking_64k
models:
  qwen3-8b-yarn64k:
    args:
      concurrency_limit: 64
      temperature: 0.7
      top_p: 0.8
      presence_penalty: 1.5
      extra_body:
        enable_thinking: false
        top_k: 20
        continue_final_message: true
        add_generation_prompt: false
    infer:
      backend: sglang
      recipe: qwen3-8b
      checkpoint: /root/models/qwen3-8b
      overrides:
        context_length: 65536
        json_model_override_args: '{"rope_scaling": {"rope_type": "yarn", "factor":
          4.0, "original_max_position_embeddings": 32768}}'
    infer_meta:
      gpu: H200-141G
      image: lmsysorg/sglang:latest

datasets:
  ruler_64k:
    class: RulerDataset
    path: ${SIEVAL_DATA_DIR}
    args:
      subtask: all
      max_seq_length: 165536
      num_samples: 500
      tokenizer_type: hf
      tokenizer_path: /root/models/qwen3-8b
      enable_thinking: true
      model_name: qwen3

tasks:
  ruler_64k:
    class: RulerZeroShotGenTask
    dataset: ruler_64k
    model: qwen3-8b-yarn64k
