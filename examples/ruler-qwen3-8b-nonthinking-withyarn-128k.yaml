# ==============================================================================
# Ruler Long-Context Evaluation — Qwen3-8B + YaRN Extended to 128K (Limit Test)
# ==============================================================================
# Evaluation scenario: Extreme long-context evaluation. Test model's long
#   document understanding and information retrieval when extended to 128K
#   tokens via YaRN position interpolation (without thinking chains).
# Task: Ruler benchmark (0-shot, generative) — 128K long context × single model
#
# Configuration highlights:
#   - Position interpolation: YaRN rope scaling (factor=4.0)
#   - Original max position: 32K → extended to 128K
#   - enable_thinking: false (disabled to save compute on extreme context)
#   - Concurrency limit: 64 (baseline rate, but may be limited by VRAM)
#   - Temperature/top_p: 0.7 / 0.8 + presence_penalty=1.5 (reduce repetition)
#   - GPU: H200-141G (highest VRAM requirement)
#   - disable_cuda_graph: true (extreme-length sequence optimization)
#
# Setup steps:
#   1. Prepare data: sieval dataset download ruler
#   2. Ensure sufficient VRAM (H200-141G or larger)
#   3. Edit model path and tokenizer path
#   4. Run evaluation: sieval run ruler-qwen3-8b-nonthinking-withyarn-128k.yaml
#
# Editable fields:
#   models.qwen3-8b-yarn128k.infer.checkpoint      — local model path
#   datasets.ruler_128k.args.tokenizer_path        — tokenizer path
#
# Output:
#   result_dir: ./outputs/ruler_qwen3_8b_nonthinking_128k
#   Single task evaluation results with 128K context performance data
#
# Performance expectations:
#   - Evaluation time: Significantly increased (128K token processing)
#   - Memory usage: Highest (may approach VRAM limit)
#   - Accuracy: Expected to degrade compared to 32K (extreme extrapolation)
#
# Note: This configuration is for benchmarking and capability boundary
#   assessment; not recommended as a daily-use baseline.
# ==============================================================================

result_dir: ./outputs/ruler_qwen3_8b_nonthinking_128k
models:
  qwen3-8b-yarn128k:
    args:
      concurrency_limit: 64
      temperature: 0.7
      top_p: 0.8
      presence_penalty: 1.5
      extra_body:
        enable_thinking: false
        top_k: 20
        continue_final_message: true
        add_generation_prompt: false
    infer:
      backend: sglang
      recipe: qwen3-8b
      checkpoint: /root/models/qwen3-8b
      overrides:
        context_length: 131072
        disable_cuda_graph: true
        json_model_override_args: '{"rope_scaling": {"rope_type": "yarn", "factor":
          4.0, "original_max_position_embeddings": 32768}}'
    infer_meta:
      gpu: H200-141G
      image: lmsysorg/sglang:latest
      
datasets:
  ruler_128k:
    class: RulerDataset
    path: ${SIEVAL_DATA_DIR}
    args:
      subtask: all
      max_seq_length: 1131072
      num_samples: 500
      tokenizer_type: hf
      tokenizer_path: /root/models/qwen3-8b
      enable_thinking: true
      model_name: qwen3

tasks:
  ruler_128k:
    class: RulerCweZeroShotGenTask
    dataset: ruler_128k
    model: qwen3-8b-yarn128k
