# ------------------------------------------------------------------------------
# RULER multi-length sweep — 1 length tiers (each loads all 13 subtasks)
# ------------------------------------------------------------------------------
# GENERATED by scripts/gen_ruler_qwen3_8b_sglang.py — edit that script, not this file.
#   lengths: 64k   native ctx: 32k
#   backend: sglang   tokenizer_model: /root/models/Qwen3-8b
#   (prompts sized with tokenizer_model; keep it == the evaluated model)
#
# Each length tier loads and evaluates all 13 RULER subtasks (NIAH×8, VT, CWE, FWE, QA×2)
# in a single dataset. The report aggregates all 13 subtasks to compute:
#   - score: per-length average across all 13 subtasks
#   - score_<subtask>_<len>: per-subtask score at that length
#
# YARN: tiers <= native ctx run with no extrapolation; tiers > native ctx get an
# engine override with factor=ceil(length/native). For an API endpoint, YARN is
# fixed server-side — delete `overrides` and point `api_base` at the deployment.
#
# `num_samples` is 500 here; RULER uses 500. Large lengths are slow
# (synthesis tokenizes every sample).
# ------------------------------------------------------------------------------
result_dir: ./outputs/ruler_qwen3_8b_sglang_test_think_64k_1

models:
  Qwen3-8B-yarn64k:  # YARN factor=4.0 (64k > native 32k)
    args:
      concurrency_limit: 64
      temperature: 0.7
      top_p: 0.8
      extra_body:
        enable_thinking: False
        top_k: 20
        presence_penalty: 1.5
        continue_final_message: True
        add_generation_prompt: False
    infer:
      backend: sglang
      recipe: qwen3-8b
      checkpoint: /root/models/Qwen3-8b
      overrides: { context_length: 65536, json_model_override_args: "{\"rope_scaling\": {\"rope_type\": \"yarn\", \"factor\": 4.0, \"original_max_position_embeddings\": 32768}}" }
    infer_meta:
      gpu: H200-141G
      image: lmsysorg/sglang:latest

datasets:
  ruler_64k:
    class: RulerDataset
    path: "${SIEVAL_DATA_DIR}"
    args: { subtask: all, max_seq_length: 65536, num_samples: 500, tokenizer_type: hf, tokenizer_path: /root/models/Qwen3-8b, enable_thinking: false }

tasks:
  ruler_64k: { class: RulerZeroShotGenTask, dataset: ruler_64k, model: Qwen3-8B-yarn64k }
