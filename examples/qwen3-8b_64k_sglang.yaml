    args: { max_seq_length: 65536, num_samples: 500, tokenizer_model: /mnt/workspace/Qwen-Qwen3-8b, type_haystack: needle, type_needle_k: words, type_needle_v: numbers, num_needle_k: 1, num_needle_v: 1, num_needle_q: 1 }
  ruler_niah_multikey_3_64k:
